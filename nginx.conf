server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ { 
    proxy_pass https://b-and-b-backend.onrender.com/api/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name b-and-b-backend.onrender.com;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
